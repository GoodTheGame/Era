<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era - Factory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <!-- Кнопки интерфейса слева сверху -->
        <div id="top-buttons">
            <button class="top-btn" id="btn-settings" title="Настройки">⚙️</button>
            <button class="top-btn" id="btn-menu" title="Меню">☰</button>
        </div>
        
        <!-- Тулбар снизу по центру -->
        <div id="toolbar"></div>
        
        <!-- Подсказки -->
        <div id="info-panel">
            <span class="key-badge">WASD</span> Движение
            <span class="key-badge">Колесо</span> Зум
            <span class="key-badge">R</span> Поворот
            <span class="key-badge">Q</span> Пипетка
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
